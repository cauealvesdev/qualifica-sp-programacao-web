<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
  </head>
  <body>
    <form action="#" method="post">
      <h2>Preencha os dados</h2>
      <fieldset>
        <legend>Dados Importantes</legend>

        <label for="nome">Nome:</label>
        <input
          type="text"
          name="nome"
          id="nome"
          placeholder="Digite seu nome"
          required
        />

        


        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha" />

        


        <label for="email">Email:</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="seuemail@site.com"
        />

        


        <fieldset>
          <legend>Pedido</legend>
          <label for="quantidade">Quantidade:</label>
          <input
            type="number"
            name="quantidade"
            id="quantidade"
            min="1"
            max="10"
          />

          


          <input
            type="checkbox"
            name="newslatter"
            id="newslatter"
            value="sim"
          />
          <label for="newslatter">Quero receber novidades</label>

          

          <hr />
        </fieldset>

        <p>Opçõpes</p>
        <input type="checkbox" name="op_a" id="op_a" value="a" />
        <label for="op_a">A - Receber em casa</label>
        

        <input type="checkbox" name="op_b" id="op_b" value="b" />
        <label for="op_b">B - Receber no Trabalho</label>
        

        <input type="checkbox" name="op_c" id="op_c" value="c" />
        <label for="op_c">C - Receber no Clube</label>

        


        <p>Seu Gênero</p>
        <input type="radio" name="genero" id="masc" />
        <label for="masc">Masculino</label>
        

        <input type="radio" name="genero" id="fem" />
        <label for="fem">Feminino</label>

        


        <label for="dt_nasc">Data de Nascimento</label>
        <input type="date" name="dt_nasc" id="dt_nasc" />

        

        <label for="cidade">Cidade:</label>
        <select name="cidade" id="cidade">
          <option value="">Selecione...</option>
          <option value="sp">São Paulo</option>
          <option value="bh">Belo Horizonte</option>
          <option value="rj">Rio de Janeiro</option>
        </select>

        

        <label for="arquivo">Anexar arquivo:</label>
        <input
          type="file"
          name="arquivo"
          id="arquivo"
          accept=".pdf,.jpg,.png"
        />

        

        <label for="telefone">Telefone:</label>
        <input
          type="text"
          name="telefone"
          pattern="\([0-9]{2}\)-[0-9]{4,5}-[0-9]{4}"
          title="Formato: (XX)-XXXXX-XXXX"
        />

        

        <input type="submit" value="Enviar" />
        <input type="reset" value="Limpar" />
      </fieldset>
    </form>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Delivery Interativo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: calc(100% - 10px);
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultados {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed #007BFF;
            border-radius: 4px;
            background-color: #eaf6ff;
        }
        .destaque {
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema de Pedidos</h1>

        <p id="mensagemBoasVindas"></p>
        
        <hr>

        <h2>🛒 Resumo do Pedido</h2>
        <div class="input-group">
            <label for="precoItem">Preço do Item:</label>
            <input type="number" id="precoItem" value="30.00">
        </div>
        <div class="input-group">
            <label for="quantidadeItem">Quantidade:</label>
            <input type="number" id="quantidadeItem" value="2">
        </div>
        <div class="input-group">
            <label for="distanciaEntrega">Distância (km):</label>
            <input type="number" id="distanciaEntrega" value="5">
        </div>
        <button onclick="calcularPedidoCompleto()">Calcular Pedido</button>
        
        <hr>

        <div id="resultados">
            <h3>Detalhes do Pedido:</h3>
            <p id="resultadoSubtotal"></p>
            <p id="resultadoImposto"></p>
            <p id="resultadoEntrega"></p>
            <p id="resultadoFreteGratis"></p>
            <p id="resultadoFinal"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

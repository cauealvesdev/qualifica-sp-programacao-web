<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos - Exemplo Prático</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 5px;
        }
        p#boasVindas {
            color: #555;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #007BFF;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 25px 0;
        }
        #resumoPedido h2 {
            margin-top: 0;
            color: #007BFF;
        }
        #resumoPedido p {
            margin: 10px 0;
            padding: 5px 0;
            border-bottom: 1px dashed #e0e0e0;
            display: flex;
            justify-content: space-between;
        }
        #resumoPedido p:last-child {
            border-bottom: none;
            font-size: 1.2em;
            font-weight: bold;
            color: #28a745;
        }
        .valor {
            font-weight: bold;
            color: #333;
        }
        .destaque {
            color: #28a745;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Meu Delivery</h1>
        <p id="boasVindas"></p>
        
        <div class="input-group">
            <label for="precoItem">Preço do Item:</label>
            <input type="number" id="precoItem" value="15.00" min="0" step="0.01">
        </div>
        
        <div class="input-group">
            <label for="quantidadeItem">Quantidade:</label>
            <input type="number" id="quantidadeItem" value="2" min="1">
        </div>

        <div class="input-group">
            <label for="distanciaEntrega">Distância (km):</label>
            <input type="number" id="distanciaEntrega" value="5" min="0" step="0.1">
        </div>

        <button onclick="processarPedido()">Finalizar Pedido</button>
        
        <hr>

        <div id="resumoPedido">
            <h2>Resumo do Pedido</h2>
            <p>Subtotal: <span class="valor" id="resultadoSubtotal"></span></p>
            <p>Imposto (8%): <span class="valor" id="resultadoImposto"></span></p>
            <p>Taxa de Entrega: <span class="valor" id="resultadoEntrega"></span></p>
            <p id="freteGratis"></p>
            <p>Total Final: <span class="valor" id="resultadoFinal"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
